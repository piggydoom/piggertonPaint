<!DOCTYPE html>
<link rel="stylesheet" href="styles.css">

<head>
    <title>piggerBoom painting program</title>
</head>


<body>
    <header>

        <div id="colourSelectionUI">
            <div id="selectionBoxWrapper">
                <div id="selectionBox"></div>
                <canvas id="selectionBoxCanvas"></canvas>
                </div>
        </div>

          <input id="hueSlider" type="range" value="0" max="360" min="0">

        <h1>piggerton paint very good simulator</h1>
         
        <button class="bStyle2" id="resetCanvasButton">CLEAR CANVAS</button>
        
        <br>

        <button class="bStyle3" id="colourWheel"><img src="assets/colourWheel.png" style="width: 20px;"></button>
        <button class="bStyle3" id="brushSize"><img src="assets/thickness.png" style="width: 20px;"></button>

        <button class="bStyle1" id="lineDraw" aria-pressed="false"><img src="assets/lineDraw.png"style="width: 20px;"></button>
        <button class="bStyle1" id="baseDraw" aria-pressed="true"><img src="assets/baseDraw.png" style="width: 20px;"></button>
        <button class="bStyle1" id="circleDraw" aria-pressed="false"><img src="assets/circleDraw.png" style="width: 20px;"></button>
        <button class="bStyle1" id="rectDraw" aria-pressed="false"><img src="assets/rectDraw.png" style="width: 20px;"></button>
        
        <br>

        <div class="optionWindow">
            <input class="RGBinputs inputFieldStyle1" id="RGB1" placeholder="RGB1" type="number">
            <input class="RGBinputs inputFieldStyle1" id="RGB2" placeholder="RGB2" type="number">
            <input class="RGBinputs inputFieldStyle1" id="RGB3" placeholder="RGB3" type="number">
            <div id="colourSel"></div>
        

        <input class="inputFieldStyle1" id="thicknessVal" min="1" max="50" type="number" value="15">
        <div class="bStyle3 bStyle3-sub" id="fillShape" style="padding: 7px; margin-top: auto; width: fit-content; display: none;"><input id="fillShapeVal" type="checkbox">FILL</div>

        
       </div>
    </header>


    <div class="canvasWrapper">
        <canvas id="GUIdisplayCanvas" height="400px" width="1080px"></canvas>
        <canvas id="paintCanvas" height="400px" width="1080px"></canvas>
    </div>


    <script src="main.js"></script>
    <script src="buttonsAndControls.js"></script>

</body>
